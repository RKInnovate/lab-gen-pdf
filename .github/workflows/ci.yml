# PR / merge gate for the lab-pdf-gen Node generator. Runs on every
# PR and every push to main. Three quick checks; nothing here takes
# longer than a fresh-clone install (~30s with the pnpm store cache).
#
# We deliberately keep this minimal because:
#   1. There is no test suite yet — the project ships a CLI that
#      is verified by running it (the planned smoke-run step lands
#      once the font-resolution fix is in main and known-green).
#   2. There is no linter configured (no eslint/prettier in deps).
#      Adding one is a future call; until then, `node --check` is
#      our compile gate — it parses every source file and rejects
#      anything that won't load.
#   3. Heavy CI on a deterministic data-generator that never runs
#      in production has very poor ROI; we'd rather burn CI minutes
#      on the consumer repos (labsense-agent, LabSense-Health) that
#      actually receive this output.

name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  # Stable, legible logs. CI=true is already in GitHub's env but
  # made explicit here so the value can't drift.
  CI: "true"
  # Tell pnpm to use the workflow cache directory rather than ~/.pnpm-store
  # so the cache action below actually hits.
  PNPM_HOME: ${{ github.workspace }}/.pnpm-store

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  install_and_syntax_check:
    name: pnpm install + node --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install pnpm BEFORE setup-node so the action's built-in
      # pnpm-store cache picks up the version we're activating.
      #
      # We use the corepack shim that ships with Node (instead of
      # pnpm/action-setup) because the latter's @v4 tag was force-
      # moved upstream and the runner's cached SHA→tar resolution
      # started returning 404 on codeload. Corepack is stable, in-
      # tree, and resolves the `packageManager` field in package.json
      # without an external action.
      - name: Enable corepack + activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.10.0 --activate
          pnpm --version

      # Node 22 LTS — matches the `engines.node >=20` declared in
      # package.json; pinned to the LTS line rather than `latest`
      # so a Node minor bump doesn't silently change CI semantics.
      # `cache: pnpm` makes setup-node automatically warm the pnpm
      # store from a hash of pnpm-lock.yaml.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # --frozen-lockfile: reject lockfile drift. If a contributor
      # bumps a dependency without committing the regenerated
      # lockfile, install fails here rather than silently picking a
      # different version on every CI run.
      - run: pnpm install --frozen-lockfile

      # Parse every source file to catch syntax errors. This catches
      # ~80% of the regressions a lint-only setup would catch, at a
      # tiny fraction of the runtime, and adds zero dev-dependencies.
      # `node --check` is the official syntax-only mode; it does not
      # execute module side-effects, so it's safe across all files.
      - name: Syntax check (node --check)
        run: |
          set -euo pipefail
          # `find ... -print0 | xargs -0` is robust to paths with
          # spaces. We scope to src/ to avoid scanning node_modules.
          find src -type f -name '*.js' -print0 \
            | xargs -0 -n1 -I{} node --check {}
